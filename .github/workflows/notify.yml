name: Telegram Notify

on:
  push:
    branches: [master]

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy started
        run: |
          MSG="đźš€ Deploy started%0Ađź“¦ ${{ github.repository }}%0Ađź’¬ ${{ github.event.head_commit.message }}%0Ađź‘¤ ${{ github.event.head_commit.author.name }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG"

  wait-and-check:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - name: Poll Vercel and notify result
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          # Debug: show first deployment object keys
          sleep 30
          RESPONSE=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          echo "=== FIRST DEPLOYMENT OBJECT ==="
          echo "$RESPONSE" | jq '.deployments[0]' 2>/dev/null || echo "$RESPONSE"
          echo "================================"

          STATUS="unknown"
          for i in $(seq 1 9); do
            RESPONSE=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=1" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}")

            STATUS=$(echo "$RESPONSE" | jq -r '.deployments[0] | .readyState // .state // .status // "unknown"' 2>/dev/null || echo "unknown")
            echo "Attempt $i: STATUS=$STATUS"

            if [ "$STATUS" = "READY" ] || [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              break
            fi
            sleep 30
          done

          if [ "$STATUS" = "READY" ]; then
            MSG="âś… Vercel deployed%0Ađź“¦ ${REPO}%0Ađź”– ${SHORT_SHA}%0Ađź’¬ ${COMMIT_MSG}%0Ađź‘¤ ${AUTHOR}"
          elif [ "$STATUS" = "ERROR" ]; then
            MSG="đź”´ Vercel build FAILED%0Ađź“¦ ${REPO}%0Ađź”– ${SHORT_SHA}%0Ađź’¬ ${COMMIT_MSG}%0Ađź‘¤ ${AUTHOR}"
          else
            MSG="âš ď¸Ź Vercel deploy: ${STATUS}%0Ađź“¦ ${REPO}%0Ađź”– ${SHORT_SHA}%0Ađź’¬ ${COMMIT_MSG}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="$MSG"
