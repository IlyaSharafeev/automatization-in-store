name: Telegram Notify

on:
  push:
    branches: [master]

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy started
        run: |
          MSG="ЁЯЪА Deploy started%0AЁЯУж ${{ github.repository }}%0AЁЯТм ${{ github.event.head_commit.message }}%0AЁЯСд ${{ github.event.head_commit.author.name }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG"

  wait-and-check:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - name: Poll Vercel and notify result
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          STATUS="unknown"

          for i in $(seq 1 10); do
            sleep 30
            RESPONSE=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=5" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}")

            STATUS=$(echo "$RESPONSE" | jq -r \
              --arg sha "$COMMIT_SHA" \
              '.deployments[] | select(.meta.githubCommitSha == $sha) | .state' \
              2>/dev/null | head -1)

            if [ -z "$STATUS" ]; then
              STATUS=$(echo "$RESPONSE" | jq -r '.deployments[0].state' 2>/dev/null || echo "unknown")
            fi

            echo "Attempt $i: STATUS=$STATUS"

            if [ "$STATUS" = "READY" ] || [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              break
            fi
          done

          if [ "$STATUS" = "READY" ]; then
            MSG="тЬЕ Vercel deployed%0AЁЯУж ${REPO}%0AЁЯФЦ ${SHORT_SHA}%0AЁЯТм ${COMMIT_MSG}%0AЁЯСд ${AUTHOR}"
          elif [ "$STATUS" = "ERROR" ]; then
            MSG="ЁЯФ┤ Vercel build FAILED%0AЁЯУж ${REPO}%0AЁЯФЦ ${SHORT_SHA}%0AЁЯТм ${COMMIT_MSG}%0AЁЯСд ${AUTHOR}"
          else
            MSG="тЪая╕П Vercel deploy: ${STATUS}%0AЁЯУж ${REPO}%0AЁЯФЦ ${SHORT_SHA}%0AЁЯТм ${COMMIT_MSG}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="$MSG"
