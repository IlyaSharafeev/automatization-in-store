name: Telegram Notify

on:
  push:
    branches: [master]

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy started
        run: |
          MSG="🚀 <b>Deploy started</b>%0A📦 ${{ github.repository }}%0A💬 ${{ github.event.head_commit.message }}%0A👤 ${{ github.event.head_commit.author.name }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="$MSG"

  wait-and-check:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Check Vercel deployment status
        id: vercel_check
        run: |
          RESPONSE=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1&target=production" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          STATUS=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin)['deployments'][0]; print(d.get('state','unknown'))" 2>/dev/null || echo "unknown")
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"

          if [ "$STATUS" = "READY" ]; then
            MSG="✅ <b>Vercel deployed</b>%0A📦 ${{ github.repository }}%0A🔖 <code>${SHA}</code>%0A💬 ${COMMIT}%0A👤 ${AUTHOR}"
          elif [ "$STATUS" = "ERROR" ]; then
            MSG="🔴 <b>Vercel build FAILED</b>%0A📦 ${{ github.repository }}%0A🔖 <code>${SHA}</code>%0A💬 ${COMMIT}%0A👤 ${AUTHOR}"
          else
            MSG="⚠️ <b>Vercel deploy: ${STATUS}</b>%0A📦 ${{ github.repository }}%0A🔖 <code>${SHA}</code>"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="$MSG"
